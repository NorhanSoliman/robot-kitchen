<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Exercise 5 – VR Tele-operation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: monospace; }
    canvas { display: block; }
    #info {
      position: absolute; top: 12px; left: 12px;
      color: #ffffffcc; background: #00000066;
      padding: 8px 14px; border-radius: 6px;
      font-size: 13px; line-height: 1.6; pointer-events: none;
    }
    #vr-status {
      position: absolute; bottom: 20px; left: 50%;
      transform: translateX(-50%);
      color: #fff; background: #00000099;
      padding: 8px 20px; border-radius: 20px;
      font-size: 13px; pointer-events: none;
    }
  </style>
</head>
<body>

<script type="importmap">
{
  "imports": {
    "three":         "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
  }
}
</script>

<script type="module">
// =============================================================================
// Exercise 5 – Tele-operation in VR
// =============================================================================
// New concepts introduced here:
//
//   1. WebXR setup — renderer.xr.enabled = true, VRButton added to DOM
//
//   2. Controller input — renderer.xr.getController(0/1) gives us an
//      Object3D whose position and rotation update automatically every frame
//      to match the physical controller in the real world.
//
//   3. Tele-operation (Option B) — we read the controller's position relative
//      to a reference point (the robot's shoulder) and map that offset onto
//      the shoulder and elbow rotation angles. Moving your right hand forward
//      and down drives the robot's right arm forward and down.
//
//   The mapping works like this:
//     controller offset in Z → shoulder X rotation (forward/back swing)
//     controller offset in Y → elbow X rotation   (bend up/down)
//   We clamp the resulting angles to safe ranges so the arm never inverts.
// =============================================================================

import * as THREE from 'three';
import { VRButton }      from 'three/addons/webxr/VRButton.js';
import { scene, camera, renderer, controls } from './js/sceneSetup.js';
import { buildRobot } from './js/robot.js';

// =============================================================================
// 1. ENABLE WebXR
// =============================================================================
// This single line tells the renderer to hand control of the render loop
// to the XR runtime when a VR session is active.
renderer.xr.enabled = true;

// VRButton creates the "Enter VR" button and handles session negotiation.
// We append it to the body — it appears automatically when WebXR is available.
document.body.appendChild(VRButton.createButton(renderer));

// =============================================================================
// 2. ROBOT
// =============================================================================
const robot = buildRobot(scene);

// Set a neutral resting pose 
robot.rightArm.shoulderPivot.rotation.x = -1.7;
//robot.rightArm.shoulderPivot.rotation.z = -0.3;
robot.rightArm.elbowPivot.rotation.x    =  0.55;
robot.leftArm.shoulderPivot.rotation.x  = -1.7;
//robot.leftArm.shoulderPivot.rotation.z  =  0.3;
robot.leftArm.elbowPivot.rotation.x     =  0.45;

// =============================================================================
// 3. CONTROLLERS
// =============================================================================
// getController(index) returns an Object3D that Three.js keeps in sync with
// the physical controller every frame during an XR session.
// Index 0 = right controller, index 1 = left controller (by convention).
const controller0 = renderer.xr.getController(0); // right
const controller1 = renderer.xr.getController(1); // left
scene.add(controller0, controller1);

// Visual marker so you can see where each controller is in the scene.
// A small glowing sphere makes it easy to spot in VR.
function makeControllerMarker(color) {
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(0.04, 12, 8),
    new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 0.6 })
  );
  return mesh;
}
controller0.add(makeControllerMarker(0xff4444)); // red  = right
controller1.add(makeControllerMarker(0x4444ff)); // blue = left

// =============================================================================
// 4. TELE-OPERATION REFERENCE POINTS
// =============================================================================
// We need to know where the robot's shoulders are in WORLD space so we can
// measure the controller's offset relative to them.
//
// robot.root is at (0, 0, -3.1).
// Shoulder world positions are computed from the robot dimensions:
//   shoulderY (world) = root.y + legH + hipsH + torsoH - 0.08 ≈ 1.30
//   shoulderX (world) = root.x ± (torsoW/2 + uArmW/2 + 0.02) ≈ ±0.33

const REF = {
  right: new THREE.Vector3( 0.33, 1.30, -3.1),
  left:  new THREE.Vector3(-0.33, 1.30, -3.1),
};

// =============================================================================
// 5. MAPPING FUNCTION
// =============================================================================
// Takes a controller's world position and a shoulder reference point,
// returns { shoulderX, elbowX } angles to apply to that arm.
//
// The idea:
//   dz = how far the controller is in front of the shoulder (Z axis)
//        → maps to shoulder forward/back rotation
//   dy = how far the controller is below the shoulder (Y axis)
//        → maps to elbow bend (lower = more bend)
//
// THREE.MathUtils.clamp(value, min, max) keeps angles in a safe range.

function controllerToAngles(controllerPos, shoulderRef) {
  // Offset of the controller relative to the shoulder reference
  const dz = shoulderRef.z - controllerPos.z; // positive = controller is in front
  const dy = shoulderRef.y - controllerPos.y; // positive = controller is below

  // Map dz (0 to 1.5 metres forward) → shoulder angle (-0.5 to -1.6 rad)
  const shoulder = THREE.MathUtils.clamp(
    -0.5 - dz * 0.8,
    -1.6,  // max forward
    -0.3   // min (arm back)
  );

  // Map dy (0 to 1 metres below) → elbow bend (0.2 to 1.4 rad)
  const elbow = THREE.MathUtils.clamp(
    0.2 + dy * 1.0,
    0.2,  // nearly straight
    1.4   // fully bent
  );

  return { shoulder, elbow };
}

// =============================================================================
// 6. VR SESSION EVENTS  — update the status label
// =============================================================================
const statusEl = document.getElementById('vr-status');

renderer.xr.addEventListener('sessionstart', () => {
  statusEl.textContent = '🟢 VR active — move controllers to drive arms';
});
renderer.xr.addEventListener('sessionend', () => {
  statusEl.textContent = 'WebXR not active';
});

// =============================================================================
// 7. RENDER LOOP
// =============================================================================
function animate() {
  // renderer.setAnimationLoop is REQUIRED for WebXR (requestAnimationFrame
  // does not work inside an XR session — the XR runtime takes over the loop).
  renderer.setAnimationLoop(animate);
  controls.update();

  if (renderer.xr.isPresenting) {
    // ── XR is active: drive arms from controller positions ──────────────────
    const rightPos = new THREE.Vector3();
    const leftPos  = new THREE.Vector3();

    // getWorldPosition() fills the vector with the controller's position
    // in world space (accounting for the headset's room-scale transform).
    controller0.getWorldPosition(rightPos);
    controller1.getWorldPosition(leftPos);

    // Map controller positions → joint angles
    const rightAngles = controllerToAngles(rightPos, REF.right);
    const leftAngles  = controllerToAngles(leftPos,  REF.left);

    // Apply to robot joints (Z tilt stays fixed — inward bend from ex4)
    robot.rightArm.shoulderPivot.rotation.x = rightAngles.shoulder;
    robot.rightArm.elbowPivot.rotation.x    = rightAngles.elbow;
    robot.leftArm.shoulderPivot.rotation.x  = leftAngles.shoulder;
    robot.leftArm.elbowPivot.rotation.x     = leftAngles.elbow;

  } else {
    // ── No XR session: show the resting pose, no animation ──────────────────
    // Nothing to update — the pose set at init time stays in place.
    // You can orbit with the mouse to inspect the robot.
  }

  renderer.render(scene, camera);
}
animate();

</script>
</body>
</html>
